<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <h2>VELOURA</h2>

  <div class="links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="collections.html">Collections</a>
  </div>
</div>

<!-- Title -->
<h1 class="title">Your Cart</h1>

<div class="cart-container">

  <!-- Products -->
  <div class="cart-items">

    <!-- Item -->
    <div class="cart-item">
      <img src="https://via.placeholder.com/80">

      <div class="info">
        <h3>Signature Hoodie</h3>
        <p>$89</p>
      </div>

      <div class="quantity">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <div class="total">$89</div>

      <button class="remove">X</button>
    </div>

    <!-- Item -->
    <div class="cart-item">
      <img src="https://via.placeholder.com/80">

      <div class="info">
        <h3>Jacket</h3>
        <p>$120</p>
      </div>

      <div class="quantity">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <div class="total">$120</div>

      <button class="remove">X</button>
    </div>

  </div>

  <!-- Summary -->
  <div class="summary">
    <h2>Order Summary</h2>

    <p>Subtotal: <span>$209</span></p>
    <p>Shipping: <span>$10</span></p>

    <h3>Total: $219</h3>

    <button class="checkout">Checkout</button>
  </div>

</div>

</body>
</html>
