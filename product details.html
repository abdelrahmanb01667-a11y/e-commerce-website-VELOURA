<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product details - VELOURA</title>
  <link rel="stylesheet" href="index.css">
</head>


<body>
    
<div class="product-details">

  <div class="images">
    <img src="hodies.jfif">
  </div>

  <div class="product-info">
    <h2>Signature Hoodie</h2>
    <p class="price">$89</p>

    <p>Premium hoodie with minimal design.</p>

    <p>Size</p>
    <div class="sizes">
      <button>S</button>
      <button>M</button>
      <button>L</button>
    </div>

    <p>Quantity</p>
    <input type="number" value="1">

    <button>Add to Cart</button>
  </div>

</div>

</body>

</html>
